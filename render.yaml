services:
  - type: web
    name: repograph-backend
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build:backend
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: repograph-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: repograph-db
    databaseName: repograph
    user: repograph
    plan: free
    region: oregon
